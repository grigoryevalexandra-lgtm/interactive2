<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Инженер Витя: Квест ВИШ — Исправление и Возврат</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        #start-btn { padding: 30px 60px; font-size: 32px; font-weight: bold; background: #D4AF37; color: white; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .canvas { position: relative; width: 1920px; height: 1080px; background: #fff; transform: scale(0.6); transform-origin: center center; overflow: hidden; box-shadow: 0 0 100px rgba(0,0,0,0.5); }
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: 100% 100%; background-repeat: no-repeat; pointer-events: none; }

        /* Слои персонажа (93-101) */
        #sun { background-image: url('93.png'); z-index: 2; width: 350px; height: 350px; left: 50px; top: 50px; background-size: contain; }
        #char { background-image: url('96.png'); z-index: 4; }
        #eyes_n { background-image: url('97.png'); z-index: 10; }
        #eyes_s { background-image: url('99.png'); z-index: 11; display: none; }
        #mouth_l { background-image: url('101.png'); z-index: 12; }
        #mouth_o { background-image: url('98.png'); z-index: 13; display: none; }
        #mouth_s { background-image: url('100.png'); z-index: 14; display: none; }
        #mouth_h { background-image: url('103.png'); z-index: 15; display: none; }

        /* СЦЕНА 102 (Ресепшн) */
        #final-scene { background-image: url('102.png'); z-index: 5; display: none; opacity: 0; }

        /* Интерфейс вопроса */
        #quiz-container {
            position: absolute; top: 250px; left: 450px; width: 750px; padding: 50px;
            background: rgba(255, 255, 255, 0.98); border-radius: 40px;
            border: 6px solid #D4AF37; z-index: 100; display: none; flex-direction: column; gap: 25px;
            pointer-events: all; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .question-text { font-size: 40px; font-weight: bold; color: #222; margin-bottom: 25px; line-height: 1.3; }
        .answer-btn { padding: 30px; font-size: 30px; border: 2px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; transition: 0.2s; text-align: left; color: #444; }
        .answer-btn:hover { background: #fdfbf7; border-color: #D4AF37; transform: translateX(10px); color: #000; }

        /* Кнопка "Попробовать еще раз" [User Summary, cite: 17] */
        #retry-btn {
            position: absolute; top: 750px; left: 585px; width: 480px; padding: 25px;
            background: #D4AF37; color: white; border: none; border-radius: 15px;
            font-size: 30px; font-weight: bold; cursor: pointer; display: none; z-index: 101;
            pointer-events: all; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
            text-transform: uppercase;
        }
        #retry-btn:hover { background: #b8952e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn" onclick="initApp()">ЗАПУСТИТЬ ТРЕНАЖЁР</button>
    </div>

    <audio id="ambient" src="office_ambient.mp3" loop preload="auto"></audio>
    <audio id="voice" src="replica1.wav" preload="auto"></audio>
    <audio id="voice-final" src="replica2.wav" preload="auto"></audio>
    <audio id="snd-pop" src="pop_appear.mp3" preload="auto"></audio>
    <audio id="snd-hover" src="tick.mp3" preload="auto"></audio>
    <audio id="snd-success" src="apple_pay.mp3" preload="auto"></audio>
    <audio id="snd-fail" src="error_fail.mp3" preload="auto"></audio>

    <div class="canvas">
        <div id="sun" class="layer"></div>
        <div id="char" class="layer"></div>
        <div id="eyes_n" class="layer"></div>
        <div id="eyes_s" class="layer"></div>
        <div id="mouth_l" class="layer"></div>
        <div id="mouth_o" class="layer"></div>
        <div id="mouth_s" class="layer"></div>
        <div id="mouth_h" class="layer"></div>

        <div id="final-scene" class="layer"></div>

        <div id="quiz-container">
            <div class="question-text">Что нужно сделать Вите в первую очередь, чтобы попасть в офис?</div>
            <button class="answer-btn" onmouseenter="playHover()" onclick="handleAnswer(false)">- приказать охраннику, чтобы пропустил</button>
            <button class="answer-btn" onmouseenter="playHover()" onclick="handleAnswer(true)">- подойти на ресепшн и получить временный пропуск</button>
        </div>

        <button id="retry-btn" onclick="resetQuiz()">Попробовать ещё раз</button>
    </div>

<script>
    const audio = document.getElementById('voice');
    const finalAudio = document.getElementById('voice-final');
    const ambient = document.getElementById('ambient');
    const sndPop = document.getElementById('snd-pop');
    const sndHover = document.getElementById('snd-hover');
    const sndSuccess = document.getElementById('snd-success');
    const sndFail = document.getElementById('snd-fail');
    
    let isFrozen = false;
    let isFinalSpeech = false;

    const speechMap = [{ start: 0.1, end: 0.8, speed: 0.15 }, { start: 1.1, end: 2.8, speed: 0.20 }, { start: 3.1, end: 4.8, speed: 0.18 }, { start: 5.1, end: 7.5, speed: 0.14 }];
    const finalSpeechMap = [{ start: 0.2, end: 1.2, speed: 0.22 }, { start: 1.8, end: 4.5, speed: 0.18 }];

    function initApp() {
        document.getElementById('overlay').style.display = 'none';
        ambient.volume = 0.35;
        ambient.play();
        gsap.to("#sun", { x: 40, y: 30, scale: 1.1, duration: 5, repeat: -1, yoyo: true, ease: "sine.inOut" });
        audio.play();
        syncMouth();
        audio.onended = showQuiz;
    }

    function playHover() { sndHover.currentTime = 0; sndHover.play(); }

    function syncMouth() {
        const currentAudio = isFinalSpeech ? finalAudio : audio;
        const currentMap = isFinalSpeech ? finalSpeechMap : speechMap;
        const openMouthId = isFinalSpeech ? 'mouth_h' : 'mouth_o';

        if (isFrozen || currentAudio.paused || currentAudio.ended) {
            resetMouth();
            return;
        }

        const currentTime = currentAudio.currentTime;
        const phase = currentMap.find(p => currentTime >= p.start && currentTime <= p.end);

        if (phase) {
            gsap.timeline({ onComplete: () => setTimeout(syncMouth, 10) })
                .set("#mouth_l", { display: "none" })
                .set(document.getElementById(openMouthId), { display: "block" })
                .set("#mouth_l", { display: "block" }, "+=" + phase.speed)
                .set(document.getElementById(openMouthId), { display: "none" }, "<");
        } else {
            resetMouth();
            setTimeout(syncMouth, 50); 
        }
    }

    function resetMouth() {
        document.getElementById('mouth_l').style.display = "block";
        document.getElementById('mouth_o').style.display = "none";
        document.getElementById('mouth_h').style.display = "none";
    }

    function showQuiz() {
        sndPop.play();
        gsap.set("#quiz-container", { display: "flex", opacity: 0, scale: 0.5 });
        gsap.to("#quiz-container", { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.7)" });
    }

    function handleAnswer(isCorrect) {
        gsap.to("#quiz-container", { opacity: 0, y: 50, duration: 0.4, onComplete: () => {
            document.getElementById('quiz-container').style.display = "none";
        }});

        ['eyes_n', 'eyes_s', 'mouth_l', 'mouth_o', 'mouth_s', 'mouth_h'].forEach(id => document.getElementById(id).style.display = "none");

        if (isCorrect) {
            // ФИКС РТА: Сразу включаем глаза и линию рта (101), чтобы не было пустой секунды
            sndSuccess.play();
            gsap.set("#char", { display: "none" });
            gsap.set("#final-scene", { display: "block", opacity: 0 });
            gsap.to("#final-scene", { opacity: 1, duration: 0.8 });

            document.getElementById('eyes_n').style.display = "block";
            document.getElementById('mouth_l').style.display = "block"; // Рот появляется СРАЗУ

            isFrozen = false;
            isFinalSpeech = true;
            
            setTimeout(() => {
                finalAudio.play();
                syncMouth();
            }, 800);

        } else {
            isFrozen = true;
            sndFail.play(); 
            document.getElementById('eyes_s').style.display = "block";
            document.getElementById('mouth_s').style.display = "block";
            
            // Показываем кнопку "Попробовать еще раз"
            gsap.set("#retry-btn", { display: "block", opacity: 0, y: 20 });
            gsap.to("#retry-btn", { opacity: 1, y: 0, duration: 0.5, delay: 0.5 });
        }
    }

    // Сброс квиза для повторной попытки
    function resetQuiz() {
        isFrozen = false;
        document.getElementById('retry-btn').style.display = "none";
        ['eyes_s', 'mouth_s'].forEach(id => document.getElementById(id).style.display = "none");
        document.getElementById('eyes_n').style.display = "block";
        document.getElementById('mouth_l').style.display = "block";
        showQuiz(); // Снова показываем вопрос
    }
</script>
</body>
</html>
